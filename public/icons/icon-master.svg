<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background: angoli arrotondati stile iOS -->
  <rect width="512" height="512" rx="114" fill="#0A0A0F"/>

  <!-- Freccia shuffle sinistra → destra (curva in alto) -->
  <path
    d="M 128 200 C 128 200 176 148 256 148 C 336 148 384 200 384 200"
    fill="none"
    stroke="#E8C547"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Punta freccia destra (in alto) -->
  <polyline
    points="352,168 384,200 352,232"
    fill="none"
    stroke="#E8C547"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Freccia shuffle destra → sinistra (curva in basso) -->
  <path
    d="M 384 312 C 384 312 336 364 256 364 C 176 364 128 312 128 312"
    fill="none"
    stroke="#E8C547"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Punta freccia sinistra (in basso) -->
  <polyline
    points="160,280 128,312 160,344"
    fill="none"
    stroke="#E8C547"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Ciak: corpo principale -->
  <rect x="194" y="218" width="124" height="76" rx="10" fill="none" stroke="#E8C547" stroke-width="16"/>

  <!-- Ciak: barra superiore con denti -->
  <rect x="194" y="206" width="124" height="22" rx="6" fill="#E8C547"/>
  <!-- Denti del ciak (3 triangoli bianchi) -->
  <polygon points="220,206 234,206 227,228" fill="#0A0A0F"/>
  <polygon points="248,206 262,206 255,228" fill="#0A0A0F"/>
  <polygon points="276,206 290,206 283,228" fill="#0A0A0F"/>

  <!-- Linea centrale del ciak (striscia orizzontale) -->
  <line x1="194" y1="256" x2="318" y2="256" stroke="#E8C547" stroke-width="10" stroke-linecap="round"/>

</svg>
